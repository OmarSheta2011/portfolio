<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="header-and-sidebar.css" />
    <link rel="stylesheet" href="index-style.css" />
  </head>
  <body>
    <input id="theme-toggle" type="checkbox" />
    <div class="main-container">
      <header>
        <!-- serach / title / profile / theme -->
        <div class="search">
          <input
            class="search-input"
            name="student_name"
            type="text"
            placeholder="Search Students"
          />
          <img
            src="../../media/photos/search.svg"
            alt="search"
            class="search-img"
          />
        </div>

        <!-- title -->
        <h1 class="page-title">Students Dashboard</h1>

        <div class="header-group">
          <!-- theme -->
          <div class="checks">
            <label for="theme-toggle">
              <img src="../../media/photos/half-moon.svg" alt="light" />
            </label>
          </div>

          <!-- profile -->
          <div class="profile">
            <img src="../../media/photos/person.svg" alt="admin-photo" />
            <h3>Admin</h3>
          </div>
        </div>
      </header>
      <aside class="sidebar">
        <!-- sidebar navigation -->
        <h2>Navigation</h2>
        <nav>
          <ul>
            <li class="nav-item active">
              <a href="dashboard.html">Dashboard</a>
            </li>
            <li class="nav-item"><a href="students.html">Students</a></li>
            <li class="nav-item"><a href="classes.html">Classes</a></li>
            <li class="nav-item"><a href="teachers.html">Teachers</a></li>
            <li class="nav-item"><a href="settings.html">Settings</a></li>
          </ul>
        </nav>
      </aside>
      <main class="content">
        <section class="stats">
          <!-- cards -->
          <div class="stats-container">
            <div class="stats-card total-card">
              <p>Total Students</p>
              <span>3,500</span>
            </div>
            <div class="stats-card active-card">
              <p>Active Students</p>
              <span>2,900</span>
            </div>
            <div class="stats-card absent-card">
              <p>Absent Students</p>
              <span>600</span>
            </div>
            <div class="stats-card classes-card">
              <p>Classes Count</p>
              <span>120</span>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
